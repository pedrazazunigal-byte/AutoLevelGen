name: Compilar AutoLevelGen

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: geode-sdk/build-geode-mod@main
        id: build
      - uses: actions/upload-artifact@v4
        with:
          name: AutoLevelGen
          path: ${{ steps.build.outputs.build-output }}
